<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Life OS · Саша</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Life OS">
  <meta name="theme-color" content="#08050f" id="tc">
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    /* ── Variables ── */
    :root {
      --bg:      #08050f;
      --g1:      rgba(80, 20, 160, 0.55);
      --g2:      rgba(160, 70,  10, 0.40);
      --g3:      rgba(10,  50, 120, 0.35);
      --g4:      rgba(100, 10, 80,  0.30);
      --glass:   rgba(255,255,255,0.045);
      --gb:      rgba(255,255,255,0.09);
      --gb2:     rgba(255,255,255,0.04);
      --accent:  #c9a96e;
      --a2:      #a78bfa;
      --text:    #f2ede4;
      --sub:     rgba(242,237,228,0.42);
      --glow:    rgba(201,169,110,0.45);
      --glow2:   rgba(167,139,250,0.35);
      --chk:     linear-gradient(135deg,#c9a96e,#a78bfa);
      --prog:    linear-gradient(90deg,#c9a96e,#a78bfa);
      --nav:     rgba(8,5,15,0.88);
      --shadow:  0 20px 60px rgba(0,0,0,.7), 0 4px 16px rgba(0,0,0,.4);
      --ib:      rgba(255,255,255,0.07);
      --ibd:     rgba(255,255,255,0.12);
      --sun-c:   #f59e0b;
    }
    [data-theme="light"] {
      --bg:      #f7f0ea;
      --g1:      rgba(255,160,140,0.45);
      --g2:      rgba(220,170,200,0.40);
      --g3:      rgba(180,210,240,0.35);
      --g4:      rgba(240,200,160,0.30);
      --glass:   rgba(255,255,255,0.65);
      --gb:      rgba(255,255,255,0.85);
      --gb2:     rgba(255,255,255,0.45);
      --accent:  #b0705e;
      --a2:      #9b6bab;
      --text:    #211010;
      --sub:     rgba(33,16,16,0.46);
      --glow:    rgba(176,112,94,0.28);
      --glow2:   rgba(155,107,171,0.25);
      --chk:     linear-gradient(135deg,#b0705e,#9b6bab);
      --prog:    linear-gradient(90deg,#b0705e,#9b6bab);
      --nav:     rgba(247,240,234,0.92);
      --shadow:  0 12px 40px rgba(150,80,60,0.14), 0 2px 8px rgba(0,0,0,.06);
      --ib:      rgba(0,0,0,0.05);
      --ibd:     rgba(0,0,0,0.12);
      --sun-c:   #d97706;
    }

    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overscroll-behavior: none; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      transition: background .7s ease, color .4s ease;
    }
    [x-cloak] { display: none !important; }
    ::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }

    /* ── Safe areas ── */
    .st { padding-top: env(safe-area-inset-top, 12px); }
    .sb { padding-bottom: calc(env(safe-area-inset-bottom,0px) + 76px); }
    .ns { padding-bottom: env(safe-area-inset-bottom,0px); }

    /* ══ ANIMATED BACKGROUND ══ */
    .bg-base {
      position: fixed; inset: 0; z-index: 0;
      background: var(--bg);
      transition: background .7s;
    }
    .aurora {
      position: fixed; inset: -30%; z-index: 1; pointer-events: none;
      background:
        radial-gradient(ellipse at 15% 15%, var(--g1) 0%, transparent 45%),
        radial-gradient(ellipse at 85% 85%, var(--g2) 0%, transparent 45%),
        radial-gradient(ellipse at 50% 60%, var(--g3) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 15%, var(--g4) 0%, transparent 40%);
      filter: blur(50px);
      animation: aura 18s ease-in-out infinite alternate;
      transition: background .7s;
    }
    @keyframes aura {
      0%   { transform: scale(1)    rotate(0deg)   translate(0,0); opacity:.7; }
      25%  { transform: scale(1.08) rotate(4deg)   translate(-2%,3%); opacity:.9; }
      50%  { transform: scale(.95)  rotate(-3deg)  translate(4%,-2%); opacity:.8; }
      75%  { transform: scale(1.05) rotate(2deg)   translate(-3%,-3%); opacity:.85; }
      100% { transform: scale(1.02) rotate(-1deg)  translate(1%,2%); opacity:.75; }
    }
    /* floating particles */
    .particles { position: fixed; inset: 0; z-index: 2; pointer-events: none; overflow: hidden; }
    .particle {
      position: absolute; border-radius: 50%;
      background: var(--accent); opacity: 0;
      animation: particleFloat linear infinite;
    }
    @keyframes particleFloat {
      0%   { opacity: 0;    transform: translateY(100vh) scale(0); }
      10%  { opacity: .35; }
      90%  { opacity: .2; }
      100% { opacity: 0;    transform: translateY(-20vh) scale(1.2) rotate(360deg); }
    }
    /* grain */
    .grain {
      position: fixed; inset: 0; z-index: 3; pointer-events: none; opacity: .025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    /* ══ LAYOUT ══ */
    main { position: relative; z-index: 10; max-width: 430px; margin: 0 auto; }

    /* ══ GLASS CARD ══ */
    .card {
      background: var(--glass);
      backdrop-filter: blur(28px) saturate(1.6);
      -webkit-backdrop-filter: blur(28px) saturate(1.6);
      border: 1px solid var(--gb);
      border-radius: 24px;
      box-shadow: var(--shadow);
      transition: background .5s, border-color .5s, transform .2s;
    }
    .card:active { transform: scale(.988); }
    .card-sm { border-radius: 16px; }
    .card-inner {
      background: var(--gb2);
      border: 1px solid var(--ibd);
      border-radius: 14px;
    }

    /* ══ TYPOGRAPHY ══ */
    .disp  { font-size: clamp(36px,9vw,48px); font-weight: 800; letter-spacing: -1.5px; line-height: 1; }
    .h1    { font-size: 26px; font-weight: 700; letter-spacing: -.5px; }
    .h2    { font-size: 18px; font-weight: 700; letter-spacing: -.3px; }
    .lbl   { font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--sub); }
    .sub   { font-size: 13px; color: var(--sub); }
    .gt    { background: linear-gradient(135deg, var(--accent), var(--a2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

    /* ══ PROGRESS ══ */
    .pt { height: 5px; border-radius: 999px; background: var(--ib); overflow: hidden; }
    .pf { height: 100%; border-radius: 999px; background: var(--prog); transition: width .7s cubic-bezier(.34,1.56,.64,1); }

    /* ══ RING ══ */
    .ring-track { fill: none; stroke: var(--gb); }
    .ring-fill  { fill: none; stroke: url(#rg); stroke-linecap: round; transition: stroke-dashoffset .9s cubic-bezier(.34,1.56,.64,1); }

    /* ══ CHECKBOX ══ */
    .cb {
      width: 26px; height: 26px; border-radius: 50%;
      border: 1.5px solid var(--ibd);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; cursor: pointer; background: var(--ib);
      transition: all .28s cubic-bezier(.34,1.56,.64,1);
    }
    .cb.on { background: var(--chk); border-color: transparent; box-shadow: 0 2px 18px var(--glow); transform: scale(1.08); }
    .cb.on svg { stroke-dashoffset: 0 !important; }
    .csq { width: 13px; height: 13px; stroke: #fff; stroke-width: 2.5; fill: none; stroke-dasharray: 20; stroke-dashoffset: 20; transition: stroke-dashoffset .33s ease .05s; }

    /* ══ SUN (urgent) ══ */
    .sun { font-size: 17px; cursor: pointer; transition: all .2s; color: var(--sub); opacity: .5; }
    .sun.on { opacity: 1; animation: sunG 1.8s ease infinite; }
    @keyframes sunG { 0%,100%{filter:drop-shadow(0 0 0 rgba(245,158,11,0))} 50%{filter:drop-shadow(0 0 12px rgba(245,158,11,.95))} }

    /* ══ BOTTOM NAV ══ */
    .bnav {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
      background: var(--nav);
      backdrop-filter: blur(32px) saturate(2);
      -webkit-backdrop-filter: blur(32px) saturate(2);
      border-top: 1px solid var(--gb);
      display: flex;
      transition: background .5s;
    }
    .ni { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 9px 2px; cursor: pointer; position: relative; }
    .ni-icon { font-size: 20px; transition: transform .3s cubic-bezier(.34,1.56,.64,1); }
    .ni-icon.on { transform: scale(1.22) translateY(-3px); }
    .ni-lbl { font-size: 9px; font-weight: 700; letter-spacing: .5px; transition: color .2s; }
    .ni-dot { position: absolute; bottom: 5px; height: 3px; border-radius: 999px; background: var(--chk); transition: width .35s cubic-bezier(.34,1.56,.64,1), opacity .3s; }

    /* ══ INPUTS ══ */
    .inp {
      width: 100%; padding: 11px 14px; border-radius: 14px;
      background: var(--ib); border: 1.5px solid var(--ibd); color: var(--text);
      font-size: 14px; outline: none; font-family: inherit;
      transition: border-color .2s, box-shadow .2s, background .5s;
    }
    .inp::placeholder { color: var(--sub); }
    .inp:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--glow); }
    .iinp {
      border: none; border-bottom: 1.5px solid var(--accent);
      background: transparent; font-size: 14px; color: var(--text);
      outline: none; padding: 2px 4px; font-family: inherit; width: 100%;
    }

    /* ══ PILL ══ */
    .pill { border-radius: 999px; padding: 7px 20px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .25s; white-space: nowrap; }
    .pill.on  { background: var(--chk); color: #fff; box-shadow: 0 4px 16px var(--glow); }
    .pill.off { background: var(--ib); color: var(--sub); border: 1px solid var(--ibd); }

    /* ══ HABITS GRID ══ */
    .hg { display: grid; grid-template-columns: 1fr repeat(7,34px); gap: 6px; align-items: center; }
    .hc {
      width: 32px; height: 32px; border-radius: 50%;
      border: 1.5px solid var(--ibd); background: var(--ib);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 12px;
      transition: all .25s cubic-bezier(.34,1.56,.64,1);
    }
    .hc.on  { background: var(--chk); border-color: transparent; box-shadow: 0 0 14px var(--glow); }
    .hc.td  { border-color: var(--accent); }
    .dh { text-align: center; font-size: 10px; font-weight: 700; color: var(--sub); letter-spacing: .5px; }
    .dh.td { color: var(--accent); }

    /* ══ THEME TOGGLE ══ */
    .th-btn {
      flex: 1; border-radius: 18px; padding: 14px 8px; text-align: center;
      font-weight: 700; font-size: 13px; cursor: pointer; letter-spacing: .3px;
      transition: all .3s;
    }
    .th-btn.on  { background: var(--chk); color: #fff; box-shadow: 0 4px 20px var(--glow); }
    .th-btn.off { background: var(--ib); color: var(--sub); border: 1px solid var(--ibd); }

    /* ══ ANIMATIONS ══ */
    @keyframes slideUp { from{opacity:0;transform:translateY(18px) scale(.96)} to{opacity:1;transform:translateY(0) scale(1)} }
    @keyframes popIn   { 0%{opacity:0;transform:scale(.85)} 70%{transform:scale(1.04)} 100%{opacity:1;transform:scale(1)} }
    @keyframes fadeIn  { from{opacity:0} to{opacity:1} }
    @keyframes countUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

    .su { animation: slideUp .38s cubic-bezier(.34,1.56,.64,1) both; }
    .su1 { animation-delay:.05s }
    .su2 { animation-delay:.1s  }
    .su3 { animation-delay:.15s }
    .su4 { animation-delay:.2s  }

    /* sparkle */
    .sp { position:fixed;pointer-events:none;z-index:9999;font-size:13px;animation:spFly .75s ease forwards; }
    @keyframes spFly { 0%{opacity:1;transform:translate(0,0)scale(1)} 100%{opacity:0;transform:translate(var(--dx),var(--dy))scale(.1)} }

    /* wish expand */
    .wx { max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.4,0,.2,1); }
    .wx.open { max-height:360px; }

    /* price badge */
    .pbadge { background:rgba(52,211,153,.14);color:#34d399;border-radius:999px;padding:2px 10px;font-size:11px;font-weight:700; }
    [data-theme="light"] .pbadge { background:rgba(4,120,87,.1);color:#065f46; }

    /* stat tile */
    .stat-tile { border-radius: 16px; padding: 14px; background: var(--ib); border: 1px solid var(--ibd); text-align: center; }
  </style>
</head>
<body x-data="app()" x-init="init()" :data-theme="settings.theme" x-cloak>

<!-- ══ Background ══ -->
<div class="bg-base"></div>
<div class="aurora"></div>
<div class="particles" id="particles"></div>
<div class="grain"></div>

<!-- SVG defs -->
<svg width="0" height="0" style="position:absolute;pointer-events:none">
  <defs>
    <linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   :stop-color="settings.theme==='light'?'#b0705e':'#c9a96e'"/>
      <stop offset="100%" :stop-color="settings.theme==='light'?'#9b6bab':'#a78bfa'"/>
    </linearGradient>
  </defs>
</svg>

<!-- ══ MAIN ══ -->
<main class="st sb px-4">

  <!-- ═══════ LIFE ═══════ -->
  <section x-show="tab==='life'" class="space-y-4 pt-4">
    <div class="flex items-start justify-between">
      <div class="su">
        <p class="lbl" x-text="t('hi')"></p>
        <h1 class="disp gt mt-1" x-text="t('life')"></h1>
      </div>
      <!-- ring -->
      <div class="relative su" style="width:88px;height:88px;animation-delay:.1s">
        <svg class="w-full h-full" style="transform:rotate(-90deg)" viewBox="0 0 80 80">
          <circle class="ring-track" cx="40" cy="40" r="34" stroke-width="5"/>
          <circle class="ring-fill" cx="40" cy="40" r="34" stroke-width="5"
            stroke-dasharray="213.6"
            :stroke-dashoffset="213.6*(1-lifeProgress(lifeSub)/100)"/>
        </svg>
        <div class="absolute inset-0 flex flex-col items-center justify-center">
          <span class="text-xl font-bold gt" x-text="lifeProgress(lifeSub)+'%'"></span>
          <span class="lbl" style="font-size:8px" x-text="t(lifeSub)"></span>
        </div>
      </div>
    </div>

    <!-- sub-nav -->
    <div class="flex gap-2 overflow-x-auto pb-1">
      <template x-for="s in lifeSubs" :key="s">
        <button @click="lifeSub=s" class="pill flex-shrink-0" :class="lifeSub===s?'on':'off'" x-text="t(s)"></button>
      </template>
    </div>

    <!-- tasks -->
    <div class="card p-4 space-y-1.5 su su2">
      <template x-for="(task,i) in lifeTasks[lifeSub]" :key="task.id">
        <div class="flex items-center gap-3 px-3 py-2.5 rounded-2xl transition-all"
             :class="task.urgent ? 'card-inner' : ''"
             x-transition:enter="su">
          <button @click.stop="toggleLife(task)" class="cb" :class="task.done?'on':''">
            <template x-if="task.done"><svg class="csq" viewBox="0 0 14 14"><polyline points="2,7 6,11 12,3"/></svg></template>
          </button>
          <div class="flex-1 min-w-0">
            <template x-if="editId===task.id">
              <input :id="'e'+task.id" class="iinp" x-model="editTxt"
                @keydown.enter="se(task,'text')" @keydown.escape="ce()" @blur="se(task,'text')">
            </template>
            <template x-if="editId!==task.id">
              <span @click="sa(task.id,task.text)" class="text-sm cursor-pointer"
                    :class="task.done?'line-through opacity-40':''" x-text="task.text"></span>
            </template>
          </div>
          <button @click.stop="task.urgent=!task.urgent;save()" class="sun" :class="task.urgent?'on':''">☀️</button>
          <button @click.stop="lifeTasks[lifeSub].splice(i,1);save()" class="opacity-20 hover:opacity-60 text-xl leading-none">×</button>
        </div>
      </template>
      <p x-show="lifeTasks[lifeSub].length===0" class="sub text-center py-6" x-text="t('empty')"></p>
      <div class="flex gap-2 pt-3 border-t" style="border-color:var(--ibd)">
        <input class="inp text-sm flex-1" :placeholder="t('add')+'…'" x-model="newTask" @keydown.enter="addLife()">
        <button @click="addLife()" class="w-11 h-11 flex-shrink-0 rounded-2xl flex items-center justify-center text-white text-xl font-light" style="background:var(--chk)">+</button>
      </div>
    </div>

    <!-- progress bar -->
    <div class="pt su su3"><div class="pf" :style="`width:${lifeProgress(lifeSub)}%`"></div></div>
  </section>

  <!-- ═══════ HABITS ═══════ -->
  <section x-show="tab==='habits'" class="space-y-4 pt-4">
    <div class="flex items-end justify-between su">
      <div>
        <p class="lbl" x-text="weekLabel()"></p>
        <h1 class="h1 mt-1" x-text="t('habits')"></h1>
      </div>
      <div class="text-right">
        <p class="disp gt" x-text="habitPct()+'%'"></p>
        <p class="lbl" x-text="t('week')"></p>
      </div>
    </div>
    <div class="pt su"><div class="pf" :style="`width:${habitPct()}%`"></div></div>

    <div class="card p-4 su su1 overflow-x-auto">
      <!-- headers -->
      <div class="hg mb-3" style="min-width:360px">
        <div></div>
        <template x-for="d in wdays" :key="d.date">
          <div class="dh" :class="d.today?'td':''">
            <div x-text="d.s"></div>
            <div class="text-xs mt-0.5 font-normal" x-text="d.n"></div>
          </div>
        </template>
      </div>
      <!-- rows -->
      <template x-for="(h,hi) in habits" :key="h.id">
        <div class="hg mb-2" style="min-width:360px" x-transition:enter="su">
          <div class="flex items-center gap-2 pr-2">
            <div class="flex-1 min-w-0">
              <template x-if="editId===h.id">
                <input :id="'e'+h.id" class="iinp text-sm" x-model="editTxt"
                  @keydown.enter="h.name=editTxt.trim()||h.name;editId=null;save()"
                  @keydown.escape="ce()" @blur="h.name=editTxt.trim()||h.name;editId=null;save()">
              </template>
              <template x-if="editId!==h.id">
                <p @click="sa(h.id,h.name)" class="text-sm font-semibold cursor-pointer truncate" x-text="h.name"></p>
              </template>
              <p class="text-xs" style="color:var(--accent)" x-show="hStreak(h)>0" x-text="hStreak(h)+'д'"></p>
            </div>
            <button @click="habits.splice(hi,1);save()" class="opacity-20 hover:opacity-60 flex-shrink-0">×</button>
          </div>
          <template x-for="d in wdays" :key="d.date">
            <button @click="tHabit(h,d.date)" class="hc" :class="[h.log[d.date]?'on':'', d.today?'td':'']">
              <template x-if="h.log[d.date]">
                <svg width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="#fff" stroke-width="2.5"><polyline points="2,7 6,11 12,3"/></svg>
              </template>
            </button>
          </template>
        </div>
      </template>
      <!-- add -->
      <div class="flex gap-2 pt-3 border-t mt-2" style="border-color:var(--ibd)">
        <input class="inp text-sm flex-1" :placeholder="t('newHabit')+'…'" x-model="newHabit" @keydown.enter="addHabit()">
        <button @click="addHabit()" class="w-11 h-11 flex-shrink-0 rounded-2xl flex items-center justify-center text-white text-xl" style="background:var(--chk)">+</button>
      </div>
    </div>
  </section>

  <!-- ═══════ WISHES ═══════ -->
  <section x-show="tab==='wishes'" class="space-y-4 pt-4">
    <div class="flex items-center justify-between su">
      <h1 class="h1 gt" x-text="t('wishes')"></h1>
      <button @click="addWish()" class="w-11 h-11 rounded-2xl flex items-center justify-center text-white text-xl" style="background:var(--chk)">+</button>
    </div>

    <template x-for="(w,wi) in wishes" :key="w.id">
      <div class="card" :class="w.done?'opacity-50':''" x-transition:enter="su">
        <div class="p-4">
          <div class="flex items-start gap-3">
            <button @click.stop="tWish(w)" class="cb mt-0.5 flex-shrink-0" :class="w.done?'on':''">
              <template x-if="w.done"><svg class="csq" viewBox="0 0 14 14"><polyline points="2,7 6,11 12,3"/></svg></template>
            </button>
            <div class="flex-1 min-w-0">
              <template x-if="editId===w.id+'t'">
                <input :id="'e'+w.id+'t'" class="iinp font-semibold text-base" x-model="editTxt"
                  @keydown.enter="w.title=editTxt.trim()||w.title;editId=null;save()"
                  @keydown.escape="ce()" @blur="w.title=editTxt.trim()||w.title;editId=null;save()">
              </template>
              <template x-if="editId!==w.id+'t'">

            </div>

    <!-- stat grid -->

      <span class="ni-dot" :style="tab===tb.id?'width:16px;opacity:1':'width:0;opacity:0'"></span>

<script>
/* ── Translations ── */
const LANG = {
  ru: {
    hi:'Привет, Саша', life:'Жизнь', habits:'Привычки', wishes:'Желания',
    shopping:'Покупки', finance:'Финансы', settings:'Настройки',
    today:'Сегодня', week:'Неделя', month:'Месяц', year:'Год',
    add:'Добавить', newHabit:'Новая привычка', wish:'Желание',
    desc:'Описание', notes:'Заметки', price:'Цена', note:'Заметка', save:'Готово',
    empty:'Список пуст', emptyW:'Добавь первое желание',
    need:'Необходимое', needD:'здоровье · документы · учёба',
    beauty:'Красота', beautyD:'косметика · уход · процедуры',
    things:'Вещи', thingsD:'одежда · техника · для дома',
    portfolio:'Портфель', cash:'Наличные', stocks:'Акции', crypto:'Крипто',
    income:'Доход', expenses:'Расходы', saved:'Накоплено',
    botTitle:'Инвестиционный бот', ops:'Операции',
    theme:'Оформление', themeDark:'Тёмная', themeLight:'Светлая',
    language:'Язык', about:'О приложении', localData:'Данные хранятся локально',
    resetQ:'Сбросить все данные?', reset:'Сбросить данные',
  },
  en: {
    hi:'Hello, Sasha', life:'Life', habits:'Habits', wishes:'Wishes',
    shopping:'Shopping', finance:'Finance', settings:'Settings',
    today:'Today', week:'Week', month:'Month', year:'Year',
    add:'Add', newHabit:'New habit', wish:'Wish',
    desc:'Description', notes:'Notes', price:'Price', note:'Note', save:'Done',
    empty:'List is empty', emptyW:'Add your first wish',
    need:'Essentials', needD:'health · docs · study',
    beauty:'Beauty', beautyD:'cosmetics · skincare · treatments',
    things:'Things', thingsD:'clothes · tech · home',
    portfolio:'Portfolio', cash:'Cash', stocks:'Stocks', crypto:'Crypto',
    income:'Income', expenses:'Expenses', saved:'Saved',
    botTitle:'Investment Bot', ops:'Operations',
    theme:'Appearance', themeDark:'Dark', themeLight:'Light',
    language:'Language', about:'About', localData:'Data stored locally',
    resetQ:'Reset all data?', reset:'Reset data',
  }
};

function app() {
  return {
    tab: 'life',
    tabs: [
      {id:'life',     icon:'◇'},
      {id:'habits',   icon:'○'},
      {id:'wishes',   icon:'◈'},
      {id:'shopping', icon:'◻'},
      {id:'finance',  icon:'◈'},
      {id:'settings', icon:'◎'},
    ],
    settings: { theme:'dark', lang:'ru' },

    /* life */
    lifeSub: 'today',
    lifeSubs: ['today','week','month','year'],
    lifeTasks: {
      today: [
        {id:11,text:'Выпить 2 литра воды',done:false,urgent:false},
        {id:12,text:'30 минут прогулки',  done:false,urgent:true},
        {id:13,text:'Ответить на письма', done:false,urgent:false},
      ],
      week: [
        {id:21,text:'Записаться к врачу',     done:false,urgent:false},
        {id:22,text:'Разобрать документы',    done:false,urgent:false},
      ],
      month: [
        {id:31,text:'Налоговый вычет',         done:false,urgent:false},
        {id:32,text:'Обновить резюме',          done:false,urgent:false},
      ],
      year: [
        {id:41,text:'Портфель 500 000 ₽',      done:false,urgent:false},
        {id:42,text:'Поездка в новую страну',  done:false,urgent:false},
        {id:43,text:'Прочитать 12 книг',        done:false,urgent:false},
      ],
    },
    newTask: '',

    /* habits */
    habits: [
      {id:'hh1',name:'Вода 2л',     log:{}},
      {id:'hh2',name:'Спорт',       log:{}},
      {id:'hh3',name:'Чтение',      log:{}},
      {id:'hh4',name:'Медитация',   log:{}},
      {id:'hh5',name:'Прогулка',    log:{}},
      {id:'hh6',name:'Витамины',    log:{}},
    ],
    newHabit: '',

    /* wishes */
    wishes: [
      {id:'ww1',title:'Кашемировое пальто',    desc:'Бежевое, оверсайз',  notes:'',link:'',priority:true, done:false,_o:false},
      {id:'ww2',title:'Курс по инвестициям',   desc:'Углублённый формат', notes:'',link:'',priority:false,done:false,_o:false},
      {id:'ww3',title:'Велосипед городской',   desc:'Светлый цвет',       notes:'',link:'',priority:false,done:false,_o:false},
    ],

    /* shopping */
    shopSecs: [
      {id:'need'  },
      {id:'beauty'},
      {id:'things'},
    ],
    shopping: {
      need:   [
        {id:'ss1',name:'Витамины D3',    price:850, note:'',link:'',urgent:false,bought:false,_o:false},
        {id:'ss2',name:'Омега-3',        price:1200,note:'',link:'',urgent:false,bought:false,_o:false},
      ],
      beauty: [
        {id:'ss3',name:'Тушь',           price:3200,note:'',link:'',urgent:false,bought:false,_o:false},
      ],
      things: [
        {id:'ss4',name:'Свечи',          price:600, note:'',link:'',urgent:false,bought:false,_o:false},
      ],
    },

    /* finance */
    fin: {
      balance:'', cash:'', stocks:'', crypto:'', income:'', expenses:'', saved:'',
      notes:'',
      ops:[
        {id:'op1',label:'Пополнение счёта', amount:10000, type:'in',  date:'2026-06-25'},
        {id:'op2',label:'ETF покупка',       amount:5000,  type:'out', date:'2026-06-24'},
      ],
    },
    finFields: [
      {id:'cash'},{id:'stocks'},{id:'crypto'},
      {id:'income'},{id:'expenses'},{id:'saved'},
    ],

    /* edit state */
    editId: null, editTxt: '',

    /* id */
    _n: 3000,

    /* ── Translation ── */
    t(k) { return (LANG[this.settings.lang]||LANG.ru)[k] || k; },

    /* ── computed ── */
    lifeProgress(sub) {
      const a = this.lifeTasks[sub];
      return a.length ? Math.round(a.filter(x=>x.done).length/a.length*100) : 0;
    },

    get wdays() {
      const today = new Date();
      const mon = new Date(today);
      mon.setDate(today.getDate()-((today.getDay()+6)%7));
      return Array.from({length:7},(_,i)=>{
        const d = new Date(mon); d.setDate(mon.getDate()+i);
        return {
          date: d.toISOString().slice(0,10),
          s: ['Mo','Tu','We','Th','Fr','Sa','Su'][i],
          n: d.getDate(),
          today: d.toDateString()===today.toDateString(),
        };
      });
    },

    weekLabel() {
      const w=this.wdays, f=d=>new Date(d).toLocaleDateString('ru',{day:'numeric',month:'short'});
      return f(w[0].date)+' — '+f(w[6].date);
    },

    habitPct() {
      const tot=this.habits.length*7; if(!tot) return 0;
      let done=0;
      for(const h of this.habits) for(const d of this.wdays) if(h.log[d.date]) done++;
      return Math.round(done/tot*100);
    },

    hStreak(h) {
      const t=new Date(); let s=0;
      for(let i=0;i<60;i++){
        const d=new Date(t); d.setDate(t.getDate()-i);
        if(!h.log[d.toISOString().slice(0,10)]) break; s++;
      }
      return s;
    },

    grandTotal() {
      let tot=0;
      for(const s of this.shopSecs)
        tot+=this.shopping[s.id].filter(i=>!i.bought).reduce((a,i)=>a+(i.price||0),0);
      return tot.toLocaleString('ru-RU')+'₽';
    },

    secTotal(id) {
      return this.shopping[id].filter(i=>!i.bought).reduce((a,i)=>a+(i.price||0),0).toLocaleString('ru-RU')+'₽';
    },

    /* ── actions ── */
    toggleLife(t) { t.done=!t.done; if(t.done)this.spark(); this.save(); },
    addLife()     {
      const v=this.newTask.trim(); if(!v) return;
      this.lifeTasks[this.lifeSub].push({id:this._n++,text:v,done:false,urgent:false});
      this.newTask=''; this.save();
    },

    tHabit(h,date) { h.log[date]=!h.log[date]; if(h.log[date])this.spark(); this.save(); },
    addHabit()     {
      const v=this.newHabit.trim(); if(!v) return;
      this.habits.push({id:'hh'+this._n++,name:v,log:{}}); this.newHabit=''; this.save();
    },

    addWish() {
      const id='ww'+this._n++;
      this.wishes.unshift({id,title:'',desc:'',notes:'',link:'',priority:false,done:false,_o:true});
      this.$nextTick(()=>{ const el=document.getElementById('e'+id+'t'); if(el)el.focus(); });
    },
    tWish(w) { w.done=!w.done; if(w.done)this.spark(); this.save(); },

    addShop(sid) {
      this.shopping[sid].push({id:'ss'+this._n++,name:this.t('add'),price:0,note:'',link:'',urgent:false,bought:false,_o:true});
      this.save();
    },
    tShop(item) { item.bought=!item.bought; if(item.bought)this.spark(); this.save(); },

    addOp() {
      const today=new Date().toISOString().slice(0,10);
      this.fin.ops.unshift({id:'op'+this._n++,label:'',amount:0,type:'out',date:today});
      this.save();
    },

    /* ── inline edit ── */
    sa(id, txt) {
      this.editId=id; this.editTxt=txt||'';
      this.$nextTick(()=>{ const el=document.getElementById('e'+id); if(el){el.focus();el.select();} });
    },
    se(item,field) {
      if(this.editId!==item.id&&this.editId!==item.id+field) return;
      const v=this.editTxt.trim(); if(v)item[field]=v;
      this.editId=null; this.editTxt=''; this.save();
    },
    ce() { this.editId=null; this.editTxt=''; },

    /* ── theme ── */
    setTheme(t) {
      this.settings.theme=t;
      document.getElementById('tc').setAttribute('content',t==='light'?'#f7f0ea':'#08050f');
      this.save();
    },

    /* ── sparkle ── */
    spark() {
      const s=['·','✦','*','◦','+'];
      const cx=window.innerWidth/2, cy=window.innerHeight*0.4;
      for(let i=0;i<8;i++){
        const el=document.createElement('span');
        el.className='sp'; el.textContent=s[i%s.length];
        el.style.color=i%2?'var(--accent)':'var(--a2)';
        el.style.fontSize=(10+Math.random()*10)+'px';
        const ang=(i/8)*Math.PI*2, dist=40+Math.random()*60;
        el.style.setProperty('--dx',Math.cos(ang)*dist+'px');
        el.style.setProperty('--dy',Math.sin(ang)*dist-40+'px');
        el.style.left=(cx-6)+'px'; el.style.top=(cy-6)+'px';
        document.body.appendChild(el);
        setTimeout(()=>el.remove(),800);
      }
    },

    /* ── particles init ── */
    initParticles() {
      const c=document.getElementById('particles');
      if(!c) return;
      for(let i=0;i<18;i++){
        const p=document.createElement('div');
        p.className='particle';
        const size=2+Math.random()*3;
        p.style.cssText=`width:${size}px;height:${size}px;left:${Math.random()*100}%;animation-duration:${12+Math.random()*18}s;animation-delay:${-Math.random()*20}s;`;
        c.appendChild(p);
      }
    },

    /* ── persist ── */
    save() {
      localStorage.setItem('lifeos_v5', JSON.stringify({
        lifeTasks:this.lifeTasks, habits:this.habits,
        wishes:this.wishes.map(w=>({...w,_o:false})),
        shopping:{
          need:  this.shopping.need.map(i=>({...i,_o:false})),
          beauty:this.shopping.beauty.map(i=>({...i,_o:false})),
          things:this.shopping.things.map(i=>({...i,_o:false})),
        },
        fin:this.fin, settings:this.settings, _n:this._n,
      }));
    },

    init() {
      const raw=localStorage.getItem('lifeos_v5');
      if(raw){
        try {
          const s=JSON.parse(raw);
          if(s.lifeTasks) this.lifeTasks=s.lifeTasks;
          if(s.habits)    this.habits=s.habits;
          if(s.wishes)    this.wishes=s.wishes.map(w=>({...w,_o:false}));
          if(s.shopping){
            ['need','beauty','things'].forEach(k=>{ if(s.shopping[k]) this.shopping[k]=s.shopping[k].map(i=>({...i,_o:false})); });
          }
          if(s.fin)      this.fin={...this.fin,...s.fin};
          if(s.settings) this.settings=s.settings;
          if(s._n)       this._n=s._n;
        } catch(e){}
      }
      document.getElementById('tc').setAttribute('content',this.settings.theme==='light'?'#f7f0ea':'#08050f');
      this.initParticles();
      if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
    },
  };
}
</script>
</body>
</html>
